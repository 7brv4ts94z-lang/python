    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: #1f2937;
            background-color: #f1f5f9;
            font-family: Arial, "Noto Sans KR", sans-serif;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            padding: 32px;
            color: white;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(30, 58, 138, 0.2);
        }

        .header h1 {
            margin: 0 0 10px;
        }

        .header p {
            margin: 0;
            opacity: 0.8;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            margin-top: 24px;
        }

        .kpi-card {
            padding: 24px;
            background-color: white;
            border-radius: 14px;
            box-shadow: 0 5px 15px rgba(15, 23, 42, 0.08);
        }

        .kpi-name {
            color: #64748b;
            font-size: 14px;
        }

        .kpi-value {
            display: block;
            margin-top: 10px;
            color: #1e3a8a;
            font-size: 26px;
            font-weight: bold;
        }

        .report-section {
            margin-top: 24px;
            padding: 28px;
            background-color: white;
            border-radius: 14px;
            box-shadow: 0 5px 15px rgba(15, 23, 42, 0.08);
        }

        .report-section h2 {
            margin-top: 0;
            color: #1e3a8a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 14px;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            color: white;
            background-color: #1e3a8a;
            text-align: left;
        }

        th:last-child,
        td:last-child {
            text-align: right;
        }

        tbody tr:hover {
            background-color: #eff6ff;
        }

        .footer {
            margin-top: 24px;
            color: #64748b;
            font-size: 13px;
            text-align: center;
        }

        @media (max-width: 700px) {
            .kpi-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
